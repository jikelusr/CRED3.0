<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRED Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1f1f1f 0%, #000000 50%, #2d2d2d 100%);
            position: relative;
            overflow: hidden;
        }

        /* ===== 分形背景样式 ===== */
        .fractal-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .fractal-layer {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fractal-layer svg {
            min-width: 120vmax;
            min-height: 120vmax;
        }

        .layer-1 { animation: fractalRotate1 40s linear infinite; }
        .layer-2 { animation: fractalRotate2 50s linear infinite reverse; }
        .layer-3 { animation: fractalPulse 30s ease-in-out infinite; }
        .layer-4 { animation: fractalRotate3 60s linear infinite; }
        .layer-5 { animation: fractalRotate4 70s linear infinite reverse; }

        @keyframes fractalRotate1 { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fractalRotate2 { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
        @keyframes fractalRotate3 { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
        @keyframes fractalRotate4 { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
        @keyframes fractalPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } }

        /* 登录卡片 */
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: transform 0.3s ease, opacity 0.3s ease, filter 0.3s ease;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .logo-text {
            font-size: 2.25rem;
            font-weight: bold;
            color: #000;
        }

        .logo-icon { width: 40px; height: 40px; }

        input[type="text"] {
            width: 16rem;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus { outline: none; border-color: #000; }

        button.main-btn {
            width: 16rem;
            padding: 0.75rem 3rem;
            background: #000;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        button.main-btn:hover:not(:disabled) {
            background: #374151;
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        button.main-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        /* ===== 设置图标样式 ===== */
        .settings-trigger {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 3.5rem;
            height: 3.5rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
        }

        .settings-trigger:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg) scale(1.1);
        }

        .settings-trigger svg {
            width: 1.75rem;
            height: 1.75rem;
        }

        /* ===== 设置菜单遮罩层 ===== */
        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .settings-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* 统一菜单容器 */
        .settings-container {
            width: 100%;
            max-width: 320px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .settings-overlay.active .settings-container {
            transform: translateY(0);
        }

        /* 菜单视图切换 */
        .menu-view {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 1rem;
        }

        .menu-view.active {
            display: flex;
        }

        .settings-title {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .menu-item {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-transform: capitalize;
        }

        .menu-item:hover {
            background: white;
            color: black;
            transform: translateX(10px);
        }

        .menu-item.danger:hover {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
        }

        /* ===== 音频面板样式 ===== */
        .audio-controls {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="range"] {
            width: 100%;
            accent-color: white;
            cursor: pointer;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 6px;
        }

        /* 返回按钮 */
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transform: translateX(-5px);
        }

        /* 关闭按钮样式 */
        .close-link {
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.5);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            text-decoration: underline;
            align-self: center;
        }

        .close-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 分形背景动画 -->
        <div class="fractal-bg">
            <div class="fractal-layer layer-1">
                <svg viewBox="-500 -500 2000 2000">
                    <polygon points="500,-400 1400,1400 -400,1400" fill="none" stroke="white" stroke-width="1.5" opacity="0.15"/>
                    <polygon points="500,-200 1200,1200 -200,1200" fill="none" stroke="white" stroke-width="1.2" opacity="0.2"/>
                </svg>
            </div>
            <div class="fractal-layer layer-2">
                <svg viewBox="-500 -500 2000 2000">
                    <polygon points="500,0 700,125 700,375 500,500 300,375 300,125" fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>
                    <polygon points="150,0 350,125 350,375 150,500 -50,375 -50,125" fill="none" stroke="white" stroke-width="1.2" opacity="0.18"/>
                </svg>
            </div>
            <div class="fractal-layer layer-3">
                <svg viewBox="-500 -500 2000 2000">
                    <circle cx="500" cy="500" r="700" fill="none" stroke="white" stroke-width="1.2" opacity="0.15"/>
                    <circle cx="500" cy="500" r="500" fill="none" stroke="white" stroke-width="1.5" opacity="0.18"/>
                </svg>
            </div>
            <div class="fractal-layer layer-4">
                <svg viewBox="-500 -500 2000 2000">
                    <rect x="-100" y="-100" width="1200" height="1200" fill="none" stroke="white" stroke-width="1.5" opacity="0.15" transform="rotate(0 500 500)"/>
                    <rect x="100" y="100" width="800" height="800" fill="none" stroke="white" stroke-width="1" opacity="0.2" transform="rotate(30 500 500)"/>
                </svg>
            </div>
            <div class="fractal-layer layer-5">
                <svg viewBox="-500 -500 2000 2000">
                    <line x1="500" y1="500" x2="500" y2="-500" stroke="white" stroke-width="1" opacity="0.1"/>
                    <line x1="500" y1="500" x2="1500" y2="500" stroke="white" stroke-width="1" opacity="0.1"/>
                    <line x1="500" y1="500" x2="500" y2="1500" stroke="white" stroke-width="1" opacity="0.1"/>
                    <line x1="500" y1="500" x2="-500" y2="500" stroke="white" stroke-width="1" opacity="0.1"/>
                </svg>
            </div>
        </div>

        <!-- 登录卡片 -->
        <div class="login-card" id="loginCard">
            <div class="logo-section">
                <div class="logo-text">CRED</div>
                <svg class="logo-icon" viewBox="0 0 40 40">
                    <rect x="8" y="8" width="20" height="20" fill="none" stroke="black" stroke-width="2"/>
                    <rect x="12" y="12" width="20" height="20" fill="none" stroke="black" stroke-width="2"/>
                    <text x="20" y="24" font-size="14" font-weight="bold" fill="black" text-anchor="middle">C</text>
                </svg>
            </div>
            <input type="text" placeholder="Username" id="username" oninput="checkInput()">
            <button type="button" class="main-btn" id="login-btn" disabled onclick="sendLogin()">login</button>
        </div>

        <!-- 设置触发图标 -->
        <div class="settings-trigger" onclick="toggleSettings(true)" title="设置">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        </div>

        <!-- 设置菜单遮罩 -->
        <div class="settings-overlay" id="settingsOverlay">
            <div class="settings-container">
                
                <!-- 主设置菜单 -->
                <div class="menu-view active" id="mainMenu">
                    <div class="settings-title">SETTINGS</div>
                    <button class="menu-item" onclick="handleMenuAction('continue')">Continue</button>
                    <button class="menu-item" onclick="handleMenuAction('new_game')">New Game</button>
                    <button class="menu-item" onclick="handleMenuAction('language')">Language</button>
                    <button class="menu-item" onclick="showSubPage('audioMenu')">Audio</button>
                    <button class="menu-item" onclick="handleMenuAction('save_quit')">Save & Quit</button>
                    <button class="menu-item danger" onclick="handleMenuAction('quit'); window.ipc.postMessage('quit_game')">Quit</button>
                    <button class="close-link" onclick="toggleSettings(false)"></button>
                </div>

                <!-- 音频设置菜单 -->
                <div class="menu-view" id="audioMenu">
                    <div class="settings-title">AUDIO</div>
                    
                    <div class="audio-controls">
                        <div class="slider-group">
                            <div class="slider-header">
                                <span>Music</span>
                                <span id="musicVal">80%</span>
                            </div>
                            <input type="range" min="0" max="100" value="80" oninput="handleVolumeChange('music', this.value)">
                        </div>
                        
                        <div class="slider-group">
                            <div class="slider-header">
                                <span>Sound Effects</span>
                                <span id="sfxVal">100%</span>
                            </div>
                            <input type="range" min="0" max="100" value="100" oninput="handleVolumeChange('sfx', this.value)">
                        </div>
                    </div>

                    <button class="menu-item back-btn" onclick="showSubPage('mainMenu')">Back</button>
                </div>

            </div>
        </div>

        <script>
            function checkInput() {
                var username = document.getElementById("username").value.trim();
                document.getElementById("login-btn").disabled = (username === "");
            }

            function sendLogin() {
                var username = document.getElementById("username").value.trim();
                if(window.ipc) {
                    window.ipc.postMessage("login:" + username);
                } else {
                    console.log("Godot IPC 暂未连接，用户名:", username);
                }
            }

            /**
             * 切换设置叠加层显示
             */
            function toggleSettings(show) {
                const overlay = document.getElementById('settingsOverlay');
                const card = document.getElementById('loginCard');
                
                if (show) {
                    overlay.classList.add('active');
                    card.style.transform = "scale(0.95)";
                    card.style.filter = "blur(10px)";
                    card.style.opacity = "0.5";
                } else {
                    overlay.classList.remove('active');
                    // 重置菜单回到主页面
                    setTimeout(() => showSubPage('mainMenu'), 300);
                    card.style.transform = "scale(1)";
                    card.style.filter = "none";
                    card.style.opacity = "1";
                }
            }

            /**
             * 切换二级子菜单
             * @param {string} pageId - 目标菜单的 ID
             */
            function showSubPage(pageId) {
                const views = document.querySelectorAll('.menu-view');
                views.forEach(v => v.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
            }

            /**
             * 处理常规动作
             */
            function handleMenuAction(action) {
                console.log("设置动作:", action);
                if (action === 'continue') toggleSettings(false);
                
                if(window.ipc) {
                    window.ipc.postMessage("settings:" + action);
                }

                if (action === 'quit' || action === 'save_quit') {
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.5s';
                }
            }

            /**
             * 处理音量调节
             */
            function handleVolumeChange(type, value) {
                const displayId = type === 'music' ? 'musicVal' : 'sfxVal';
                document.getElementById(displayId).innerText = value + '%';
                
                if(window.ipc) {
                    window.ipc.postMessage("volume:" + type + ":" + value);
                }
            }

            // 快捷键 ESC 关闭设置
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') toggleSettings(false);
            });
        </script>
    </div>
</body>
</html>
